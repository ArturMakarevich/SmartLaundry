<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">SmartLaundry logo</title>
  <desc id="desc">A washing machine icon matching the app loader.</desc>
  <style>
    :root {
      --body-fill: #f3f4f6;
      --body-stroke: #d1d5db;
      --panel-fill: #e5e7eb;
      --ring-stroke: #9ca3af;
      --glass-fill: #ffffff;
      --drum-stroke: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --body-fill: #374151;
        --body-stroke: #4b5563;
        --panel-fill: #1f2937;
        --ring-stroke: #4b5563;
        --glass-fill: #111827;
        --drum-stroke: #6b7280;
      }
    }
  </style>
  <rect x="10" y="20" width="100" height="90" rx="8" fill="var(--body-fill)" stroke="var(--body-stroke)" stroke-width="2"/>
  <rect x="15" y="25" width="90" height="15" rx="4" fill="var(--panel-fill)"/>
  <circle cx="25" cy="32" r="3" fill="#2563eb"/>
  <circle cx="35" cy="32" r="3" fill="#10b981"/>
  <circle cx="45" cy="32" r="3" fill="#f59e0b"/>
  <circle cx="60" cy="75" r="30" fill="none" stroke="var(--ring-stroke)" stroke-width="3"/>
  <circle cx="60" cy="75" r="26" fill="var(--glass-fill)" opacity="0.9"/>
  <circle cx="60" cy="75" r="20" fill="none" stroke="var(--drum-stroke)" stroke-width="1"/>
  <g stroke="var(--drum-stroke)" stroke-width="2" stroke-linecap="round">
    <line x1="75" y1="75" x2="80" y2="75"/>
    <line x1="67.5" y1="88" x2="70" y2="92.3"/>
    <line x1="52.5" y1="88" x2="50" y2="92.3"/>
    <line x1="45" y1="75" x2="40" y2="75"/>
    <line x1="52.5" y1="62" x2="50" y2="57.7"/>
    <line x1="67.5" y1="62" x2="70" y2="57.7"/>
  </g>
</svg>
